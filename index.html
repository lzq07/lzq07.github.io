<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沈本五羊的个人博客</title>
  <style>
    /* 全局重置与字体 — 干净、现代 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    } 

    body {
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #1e1e2f;

      /* 美观的动态渐变背景 —— 柔和、流动、不刺眼 */
      background: linear-gradient(-45deg, #f3e9ff, #9bcdee, #da86aa, #e6f3e8);
      background-size: 400% 400%;
      animation: breath 18s ease infinite;

      /* 让背景覆盖整个视口，并增加细腻的纹理让背景更有质感（可选，极淡） */
      position: relative;
    }

    /* 叠加一个极细的噪点纹理，增加层次感 (非常 subtle) */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjc0IiBudW1PY3RhdmVzPSIzIiAvPjwvZmlsdGVyPjxyZWN0IHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIGZpbHRlcj0idXJsKCNmKSIgb3BhY2l0eT0iMC4wMjUiIC8+PC9zdmc+');
      opacity: 0.2;  /* 几乎不可见，只增加一点点手工感 */
      pointer-events: none;
      z-index: 0;
    }

    @keyframes breath {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* 主内容卡片 — 半透磨砂玻璃风格，简洁且突出可读性 */
    .wrapper {
      max-width: 820px;
      margin: 0 auto;
      padding: 2.5rem 1.8rem;
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(2px); /* 极其轻微的模糊，增加层次 */
    }

    /* 头部区域 */
    .blog-header {
      text-align: center;
      margin-bottom: 3.5rem;
      padding: 1rem 0;
    }

    .avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      background: rgba(255, 255, 255, 0.6);
      box-shadow: 0 10px 25px -8px rgba(0, 0, 0, 0.1);
      border: 3px solid rgba(255, 255, 255, 0.7);
      margin-bottom: 1.2rem;
      transition: transform 0.3s ease;
    }

    .avatar:hover {
      transform: scale(1.02);
    }

    .blog-title {
      font-size: 2.8rem;
      font-weight: 500;
      letter-spacing: -0.5px;
      color: #2a2a40;
      margin-bottom: 0.25rem;
      text-shadow: 0 2px 5px rgba(255,255,255,0.5);
    }

    .blog-subtitle {
      font-size: 1.2rem;
      font-weight: 300;
      color: #3e3e5e;
      border-bottom: 1px solid rgba(255, 255, 255, 0.5);
      display: inline-block;
      padding-bottom: 0.4rem;
      margin-top: 0.2rem;
      backdrop-filter: blur(10px);
    }

    /* 导航栏 — 极简胶囊 */
    .nav-links {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin: 2rem 0 1rem 0;
      flex-wrap: wrap;
    }

    .nav-links a {
      text-decoration: none;
      color: #2e2e4a;
      font-weight: 450;
      padding: 0.4rem 0.8rem;
      border-radius: 40px;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(4px);
      transition: all 0.2s ease;
      font-size: 1.05rem;
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.02);
    }

    .nav-links a:hover {
      background: rgba(255, 255, 255, 0.7);
      border-color: rgba(255, 255, 255, 0.9);
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.04);
      transform: translateY(-2px);
    }

    /* 博客文章列表 */
    .posts-list {
      display: flex;
      flex-direction: column;
      gap: 2.2rem;
      margin-top: 1.5rem;
      flex: 1;
    }

    .post-card {
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 1.8rem 2.2rem;
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 15px 35px -12px rgba(0, 0, 0, 0.08);
      transition: background 0.3s, box-shadow 0.3s, transform 0.2s;
    }

    .post-card:hover {
      background: rgba(255, 255, 255, 0.7);
      box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12);
      transform: scale(1.01);
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.9rem;
      color: #4a4a6a;
      margin-bottom: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .post-date {
      background: rgba(230, 240, 255, 0.5);
      padding: 0.2rem 1rem;
      border-radius: 30px;
      font-weight: 400;
      border: 1px solid rgba(255,255,255,0.5);
    }

    .post-tag {
      background: rgba(210, 230, 250, 0.5);
      padding: 0.2rem 1rem;
      border-radius: 30px;
      font-weight: 400;
      border: 1px solid rgba(255,255,255,0.5);
    }

    .post-title {
      font-size: 30px;
      font-weight: 480;
      letter-spacing: -0.3px;
      line-height: 1.3;
      margin: 0.5rem 0 0.8rem 0;
      color: #1f1f35;
    }

    .post-title a {
      text-decoration: none;
      color: inherit;
      transition: color 0.2s;
    }

    .post-title a:hover {
      color: #4d4d8a;
    }

    .post-excerpt {
      color: #2f2f48;
      font-size: 1.05rem;
      margin-bottom: 1rem;
      opacity: 0.9;
    }

    .read-more {
      display: inline-flex;
      align-items: center;
      font-weight: 470;
      color: #2b2b5c;
      text-decoration: none;
      border-bottom: 2px solid rgba(90, 90, 140, 0.3);
      padding-bottom: 2px;
      transition: border-color 0.2s, color 0.2s;
    }

    .read-more:hover {
      color: #1d1d3b;
      border-bottom-color: #5a5a8c;
    }

    .read-more::after {
      content: " →";
      font-size: 1.2rem;
      line-height: 1;
      margin-left: 4px;
      transition: transform 0.2s;
    }

    .read-more:hover::after {
      transform: translateX(4px);
    }

    /* 页脚 — 简单分隔 */
    .blog-footer {
      margin-top: 3.5rem;
      text-align: center;
      color: #3a3a58;
      font-size: 0.95rem;
      padding: 1.5rem 0 0.5rem 0;
      border-top: 1px solid rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(4px);
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1.2rem;
    }

    .social-links a {
      color: #3b3b60;
      text-decoration: none;
      font-size: 1rem;
      border-radius: 30px;
      background: rgba(255,255,255,0.3);
      padding: 0.3rem 1.2rem;
      border: 1px solid rgba(255,255,255,0.5);
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .social-links a:hover {
      background: rgba(255,255,255,0.8);
      border-color: #ffffff;
    }

    /* 简单占位文章 (用于展示) */
    /* 响应式细节 */
    @media (max-width: 550px) {
      .wrapper {
        padding: 1.8rem 1.2rem;
      }
      .blog-title {
        font-size: 2.2rem;
      }
      .post-card {
        padding: 1.5rem 1.5rem;
      }
      .post-title {
        font-size: 1.6rem;
      }
      .nav-links {
        gap: 1rem;
      }
    }

    /* 为了让模糊质感在暗色下也舒服，文字保持深色 */
    ::selection {
      background: rgba(180, 190, 230, 0.5);
      color: #111;
    }
  </style>
  <!-- 使用 Inter 字体 (可选，更干净) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="wrapper">
    <header class="blog-header">
      <!-- 简约头像图标 (SVG 或者图片，用emoji占位? 但放一个纯色头像, 可以是圆形优雅占位符) -->
      <div class="avatar" style="background: #cfd9e6; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: #4a4a70;"><img src="icon.jpg" alt="" width="60px"></div>
      <h1 class="blog-title">沈本五羊散记</h1>
      <div class="blog-subtitle">冲刺 · 滑铲 · 雄鹿</div>

    <main class="posts-list">

      <article class="post-card">
        <div class="post-meta">
          <span class="post-date">2026年3月12日</span>

        </p>

    <footer class="blog-footer">
      <div class="social-links">
        <a href="#" aria-label="GitHub">GitHub</a>
        <a href="#" aria-label="Twitter">Twitter</a>
        <a href="#" aria-label="RSS">RSS</a>
      </div>
      <p>© 2026 沈本五羊散记  · 部署于 GitHub Pages</p>
    </footer>
  </div>

  <!-- 可选的微小脚本用于动态年份，但非必须，留作纯粹展示 -->
  <script>
    (function() {
      // 仅仅让背景呼吸更平顺，以及可更新footer年份（目前手动2025，也可以不改）

      console.log('博客主题 | 动态渐变背景 · 简洁个人博客');
    })();
  </script>
</body>
</html>
